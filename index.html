<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศรีแก้ว-คลังมะขาม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>

    <style>
        html { font-size: 110%; } /* ลดขนาดตัวอักษรลง 10% จาก 120% */
        .menu-text { font-size: 1.2rem !important; } /* เพิ่มขนาดเมนู 20% */
        button, .btn-text { font-size: 0.85rem !important; }

        .active-tab { border-bottom: 5px solid #059669; color: #059669; font-weight: 900; }
        .hidden { display: none; }
        
        .badge-qty { background: #ecfdf5; color: #059669; padding: 2px 12px; border-radius: 999px; border: 1px solid #10b981; }
        .row-highlight:nth-child(even) { background-color: #f8fafc; }

        /* ปรับแต่ง Awesomplete ให้สวยงาม */
        .awesomplete { width: 100%; }
        .awesomplete > ul { 
            border-radius: 1rem; 
            border: 2px solid #f1f5f9; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            background: white;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="flex justify-around font-bold uppercase p-3">
            <button onclick="showPage('in')" id="tab-in" class="py-2 px-4 active-tab menu-text">รับเข้า</button>
            <button onclick="showPage('out')" id="tab-out" class="py-2 px-4 menu-text">เบิกออก</button>
            <button onclick="showPage('stock')" id="tab-stock" class="py-2 px-4 menu-text">Stock</button>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-5 pb-24">
        
        <section id="page-in" class="space-y-5">
            <div class="bg-white p-6 rounded-3xl shadow-md border border-emerald-100">
                <h2 class="text-2xl font-black text-emerald-800 mb-5 tracking-tight">📥 รับของเข้า</h2>
                <label class="block font-semibold mb-1 text-slate-600">ผู้บันทึก</label>
                <select id="user-in" class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 mb-4 focus:border-emerald-500 outline-none"></select>
                
                <label class="block font-semibold mb-1 text-slate-600">ชั้นจัดเก็บ (พิมพ์เพื่อค้นหา)</label>
                <input id="loc-in" class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 focus:border-emerald-500 outline-none" placeholder="เลือกชั้นจัดเก็บ..." />
                
                <button onclick="startScan('in')" class="w-full mt-6 bg-emerald-600 text-white py-4 rounded-2xl font-extrabold shadow-emerald-200 shadow-lg active:scale-95 transition-transform">
                    <i class="fas fa-camera mr-2"></i> สแกน QR CODE
                </button>
            </div>
            <div id="container-list-in" class="bg-white rounded-3xl shadow-sm overflow-hidden border hidden">
                <table class="w-full text-left">
                    <thead class="bg-emerald-600 text-white"><tr><th class="p-4">รายการ</th><th class="p-4 text-center">ลบ</th></tr></thead>
                    <tbody id="list-in" class="divide-y"></tbody>
                </table>
            </div>
            <button onclick="submitData('in')" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-bold shadow-xl">ยืนยันการจัดเก็บ</button>
        </section>

        <section id="page-out" class="hidden space-y-5">
            <div class="bg-white p-6 rounded-3xl shadow-md border border-orange-100">
                <h2 class="text-2xl font-black text-orange-700 mb-5 tracking-tight">📤 เบิกของออก</h2>
                <label class="block font-semibold mb-1 text-slate-600">ผู้บันทึก</label>
                <select id="user-out" class="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 focus:border-orange-500 outline-none"></select>
                <button onclick="startScan('out')" class="w-full mt-6 bg-orange-500 text-white py-4 rounded-2xl font-extrabold shadow-orange-200 shadow-lg active:scale-95 transition-transform">
                    <i class="fas fa-barcode mr-2"></i> สแกนเพื่อเบิก
                </button>
            </div>
            <div id="container-list-out" class="bg-white rounded-3xl shadow-sm overflow-hidden border hidden">
                <table class="w-full text-left">
                    <thead class="bg-orange-500 text-white"><tr><th class="p-4">รายการ</th><th class="p-4 text-center">ลบ</th></tr></thead>
                    <tbody id="list-out" class="divide-y"></tbody>
                </table>
            </div>
            <button onclick="submitData('out')" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-bold shadow-xl">ยืนยันการเบิก</button>
        </section>

        <section id="page-stock" class="hidden animate-fadeIn">
            <div class="mb-6">
                <h3 class="text-xl font-black text-slate-800 mb-4 flex items-center">
                    <span class="bg-emerald-500 w-2 h-8 rounded-full mr-3"></span>
                    ยอดสรุปคงเหลือ
                </h3>
                <div class="grid grid-cols-1 gap-3" id="stock-summary"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-lg border border-blue-50">
                <h3 class="text-xl font-black text-blue-800 mb-4">📍 คลังละเอียด</h3>
                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase">กรองชนิดมะขาม</label>
                    <select id="filter-type" onchange="filterStock()" class="w-full border-2 border-blue-100 p-4 rounded-2xl bg-blue-50 focus:ring-4 ring-blue-100 outline-none"></select>
                </div>
                <div class="overflow-hidden rounded-2xl border border-blue-100">
                    <table class="w-full text-sm">
                        <thead class="bg-blue-600 text-white font-bold">
                            <tr><th class="p-4">โกดัง</th><th class="p-4">ตำแหน่ง</th><th class="p-4">คงเหลือ</th></tr>
                        </thead>
                        <tbody id="stock-detail" class="text-center divide-y divide-blue-50"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="scanner-modal" class="fixed inset-0 bg-slate-900/95 hidden z-[60] flex flex-col items-center justify-center p-6">
        <div id="reader" class="w-full max-w-sm rounded-3xl overflow-hidden border-4 border-white shadow-2xl"></div>
        <button onclick="stopScan()" class="mt-10 bg-white text-red-600 px-12 py-4 rounded-full font-black shadow-xl">ปิดกล้อง</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhMYBP1hZZjkiVx3GS6JwZ_VucYEd87EwK0i7Zt7V7zGqlxkfw4C2ul9w6Zlg2WKZ30A/exec"; 
        
        let scannedItems = { in: [], out: [] };
        let fullStockData = [];
        let existingStock = [];
        let aweIn; // Awesomplete object

        function showPage(page) {
            ['in', 'out', 'stock'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
                document.getElementById(`tab-${p}`).classList.remove('active-tab');
            });
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`tab-${page}`).classList.add('active-tab');
            if(page === 'stock') loadStock();
        }

        async function init() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getInitialData`);
                const data = await res.json();
                fillSelect('user-in', data.users);
                fillSelect('user-out', data.users);
                fillSelect('filter-type', ['แสดงทั้งหมด', ...data.types]);
                existingStock = data.stockItems;

                // ตั้งค่าระบบพิมพ์นำ (Awesomplete)
                const locInput = document.getElementById('loc-in');
                aweIn = new Awesomplete(locInput, {
                    list: data.locations,
                    minChars: 0,
                    maxItems: 15,
                    autoFirst: true
                });
                locInput.addEventListener("click", () => {
                    if (aweIn.ul.childNodes.length > 0 && aweIn.ul.hidden) {
                        aweIn.evaluate(); aweIn.open();
                    }
                });
            } catch(e) { console.error("Error", e); }
        }

        function fillSelect(id, items) {
            document.getElementById(id).innerHTML = items.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        let html5QrCode;
        function startScan(type) {
            document.getElementById('scanner-modal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
            (text) => { addItem(type, text); });
        }

        function stopScan() {
            if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-modal').classList.add('hidden'));
        }

        function addItem(type, item) {
            if (scannedItems[type].includes(item)) return;
            const inStock = existingStock.includes(item);
            if (type === 'in' && inStock) return alert(`⚠️ มีอยู่ในสต็อกแล้ว (${item})`);
            if (type === 'out' && !inStock) return alert(`❌ ไม่พบรหัสนี้ในคลัง (${item})`);

            scannedItems[type].push(item);
            // เรียงลำดับรหัสสินค้าจากน้อยไปมาก
            scannedItems[type].sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
            
            renderList(type);
            if (navigator.vibrate) navigator.vibrate(70);
        }

        function renderList(type) {
            const container = document.getElementById(`container-list-${type}`);
            const tbody = document.getElementById(`list-${type}`);
            
            // แสดงตารางเมื่อมีข้อมูลเท่านั้น
            if (scannedItems[type].length > 0) {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }

            tbody.innerHTML = scannedItems[type].map((item, idx) => `
                <tr class="row-highlight">
                    <td class="p-4 font-mono text-sm">${item}</td>
                    <td class="p-4 text-center" onclick="removeItem('${type}', ${idx})">
                        <i class="fas fa-times-circle text-red-400 text-xl cursor-pointer"></i>
                    </td>
                </tr>
            `).join('');
        }

        function removeItem(type, idx) {
            scannedItems[type].splice(idx, 1);
            renderList(type);
        }

        async function submitData(type) {
            const items = scannedItems[type];
            if(!items.length) return alert('กรุณาสแกนรายการ');
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i>กำลังบันทึก...";

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        action: type, 
                        user: document.getElementById(`user-${type}`).value, 
                        location: type === 'in' ? document.getElementById(`loc-in`).value : '',
                        items 
                    })
                });
                alert('✅ บันทึกข้อมูลสำเร็จ');
                scannedItems[type] = [];
                if(type === 'in') document.getElementById('loc-in').value = '';
                renderList(type);
                init();
            } catch(e) { alert('ผิดพลาด'); }
            finally { btn.disabled = false; btn.innerText = type === 'in' ? 'ยืนยันการจัดเก็บ' : 'ยืนยันการเบิก'; }
        }

        async function loadStock() {
            const res = await fetch(`${WEB_APP_URL}?action=getStock`);
            const data = await res.json();
            document.getElementById('stock-summary').innerHTML = data.summary.map(r => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-8 border-emerald-500 flex justify-between items-center">
                    <span class="font-bold text-slate-700">${r[0]}</span>
                    <span class="badge-qty font-black text-lg">${r[1]}</span>
                </div>
            `).join('');
            fullStockData = data.details;
            filterStock();
        }

        function filterStock() {
            const val = document.getElementById('filter-type').value;
            let filtered = val === 'แสดงทั้งหมด' ? fullStockData : fullStockData.filter(r => r[0] === val);
            
            // เรียงชื่อโกดังตามตัวอักษร
            filtered.sort((a, b) => String(a[1]).localeCompare(String(b[1]), 'th'));

            document.getElementById('stock-detail').innerHTML = filtered.map(r => `
                <tr class="row-highlight">
                    <td class="p-4 text-slate-600 font-medium">${r[1]}</td>
                    <td class="p-4 text-slate-600">${r[2]}</td>
                    <td class="p-4 font-black text-blue-600 underline decoration-blue-200">${r[3]}</td>
                </tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
