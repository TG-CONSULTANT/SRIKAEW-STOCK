<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศรีแก้ว-คลังมะขาม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .active-tab { border-bottom: 4px solid #059669; color: #059669; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="flex justify-around text-sm font-bold uppercase p-3">
            <button onclick="showPage('in')" id="tab-in" class="py-2 px-4 active-tab">รับเข้า</button>
            <button onclick="showPage('out')" id="tab-out" class="py-2 px-4">เบิกออก</button>
            <button onclick="showPage('stock')" id="tab-stock" class="py-2 px-4">Stock</button>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4 mb-20">
        <section id="page-in" class="space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <label class="block text-gray-700 mb-1">ผู้บันทึก</label>
                <select id="user-in" class="w-full border p-3 rounded-lg bg-gray-50"></select>
                <label class="block text-gray-700 mt-3 mb-1">ชั้นจัดเก็บ</label>
                <select id="loc-in" class="w-full border p-3 rounded-lg bg-gray-50"></select>
                <button onclick="startScan('in')" class="w-full mt-4 bg-emerald-600 text-white p-4 rounded-xl font-bold">
                    <i class="fas fa-qrcode mr-2"></i> สแกน QR Code
                </button>
            </div>
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-200"><tr><th class="p-3">รายการ</th><th class="p-3 text-center">ลบ</th></tr></thead>
                    <tbody id="list-in"></tbody>
                </table>
            </div>
            <button onclick="submitData('in')" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg">บันทึกข้อมูลรับเข้า</button>
        </section>

        <section id="page-out" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <label class="block text-gray-700 mb-1">ผู้บันทึก</label>
                <select id="user-out" class="w-full border p-3 rounded-lg bg-gray-50"></select>
                <button onclick="startScan('out')" class="w-full mt-4 bg-orange-500 text-white p-4 rounded-xl font-bold">
                    <i class="fas fa-qrcode mr-2"></i> สแกน QR Code เพื่อเบิก
                </button>
            </div>
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-200"><tr><th class="p-3">รายการ</th><th class="p-3 text-center">ลบ</th></tr></thead>
                    <tbody id="list-out"></tbody>
                </table>
            </div>
            <button onclick="submitData('out')" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg">บันทึกข้อมูลเบิกออก</button>
        </section>

        <section id="page-stock" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold text-lg mb-2">สรุปคงเหลือ</h3>
                <div class="max-h-40 overflow-y-auto">
                    <table class="w-full">
                        <tbody id="stock-summary" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <label class="block text-gray-700 mb-1">กรองชนิดมะขาม</label>
                <select id="filter-type" onchange="filterStock()" class="w-full border p-3 rounded-lg bg-gray-50"></select>
                <div class="mt-4 overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100"><tr><th class="p-2">โกดัง</th><th class="p-2">ตำแหน่ง</th><th class="p-2">เหลือ</th></tr></thead>
                        <tbody id="stock-detail" class="divide-y text-center"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="scanner-modal" class="fixed inset-0 bg-black bg-opacity-90 hidden z-[60] flex flex-col items-center justify-center p-4">
        <div id="reader" class="w-full max-w-sm rounded-lg overflow-hidden"></div>
        <button onclick="stopScan()" class="mt-6 bg-red-500 text-white px-8 py-3 rounded-full font-bold">ปิดหน้าจอ</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx6x2sUSrvr4N1GjvsS5kzW-KGBN38u0R5tMs-GpZmFAcsXt3St56CGph6c8JecUrHb/exec";
        let scannedItems = { in: [], out: [] };
        let fullStockData = [];
        let existingStock = [];

        // Navigation
        function showPage(page) {
            ['in', 'out', 'stock'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
                document.getElementById(`tab-${p}`).classList.remove('active-tab');
            });
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`tab-${page}`).classList.add('active-tab');
            if(page === 'stock') loadStock();
        }

        // Load Data
        async function init() {
            const res = await fetch(`${WEB_APP_URL}?action=getInitialData`);
            const data = await res.json();
            
            fillSelect('user-in', data.users);
            fillSelect('user-out', data.users);
            fillSelect('loc-in', data.locations);
            fillSelect('filter-type', ['ทั้งหมด', ...data.types]);
            existingStock = data.stockItems;
        }

        function fillSelect(id, items) {
            const el = document.getElementById(id);
            el.innerHTML = items.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        // Scanner Logic
        let html5QrCode;
        function startScan(type) {
            document.getElementById('scanner-modal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                addItem(type, decodedText);
                // สแกนต่อได้ทันที
            });
        }

        function stopScan() {
            if(html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('scanner-modal').classList.add('hidden');
            });
        }

        function addItem(type, item) {
            if (scannedItems[type].includes(item)) return;

            const inStock = existingStock.includes(item);
            if (type === 'in' && inStock) alert('⚠️ รายการนี้มีอยู่ใน Stock แล้ว');
            if (type === 'out' && !inStock) alert('❌ ไม่มีรายการนี้ใน Stock');

            scannedItems[type].push(item);
            renderList(type);
        }

        function renderList(type) {
            const tbody = document.getElementById(`list-${type}`);
            tbody.innerHTML = scannedItems[type].map((item, idx) => `
                <tr class="border-b">
                    <td class="p-3">${item}</td>
                    <td class="p-3 text-center text-red-500" onclick="removeItem('${type}', ${idx})"><i class="fas fa-trash"></i></td>
                </tr>
            `).join('');
        }

        function removeItem(type, idx) {
            scannedItems[type].splice(idx, 1);
            renderList(type);
        }

        async function submitData(type) {
            const user = document.getElementById(`user-${type}`).value;
            const location = type === 'in' ? document.getElementById(`loc-in`).value : '';
            const items = scannedItems[type];

            if(items.length === 0) return alert('กรุณาสแกนรายการก่อนบันทึก');

            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: type, user, location, items })
            });
            
            if(res.ok) {
                alert('บันทึกสำเร็จ');
                scannedItems[type] = [];
                renderList(type);
                init(); // refresh stock logic
            }
        }

        // Stock Logic
        async function loadStock() {
            const res = await fetch(`${WEB_APP_URL}?action=getStock`);
            const data = await res.json();
            
            document.getElementById('stock-summary').innerHTML = data.summary.map(r => `
                <tr class="flex justify-between py-2 px-1"><td>${r[0]}</td><td class="font-bold text-emerald-600">${r[1]}</td></tr>
            `).join('');
            
            fullStockData = data.details;
            filterStock();
        }

        function filterStock() {
            const val = document.getElementById('filter-type').value;
            const filtered = val === 'ทั้งหมด' ? fullStockData : fullStockData.filter(r => r[0] === val);
            
            document.getElementById('stock-detail').innerHTML = filtered.map(r => `
                <tr><td class="p-2">${r[1]}</td><td class="p-2">${r[2]}</td><td class="p-2 font-bold">${r[3]}</td></tr>
            `).join('');
        }

        init();
    </script>
</body>
</html>
